<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>餐厅在线预定</title>
<style>
  :root {
    color-scheme: light;
    --primary: #8B4513;
    --primary-light: #A0522D;
    --bg: #faf7f2;
    --card-bg: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #6b6b6b;
    --border: #e8e0d5;
    --input-bg: #fdfaf6;
    --success: #5a8a4a;
    --error: #c0392b;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---- Header ---- */
  .header {
    background: linear-gradient(135deg, #3a1c0d 0%, #5a2d14 40%, #8B4513 100%);
    color: #fff;
    text-align: center;
    padding: 28px 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 18px;
    background: var(--bg);
    border-radius: 50% 50% 0 0;
  }
  .header .restaurant-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 13px;
    opacity: 0.8;
    letter-spacing: 1px;
  }

  /* ---- Container ---- */
  .container {
    max-width: 500px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* ---- Form Card ---- */
  .form-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: var(--shadow);
    margin-top: -10px;
  }
  .form-card .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .icon { font-size: 18px; }

  /* ---- Form Group ---- */
  .form-group {
    margin-bottom: 18px;
  }
  .form-group:last-child { margin-bottom: 0; }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-group label .required {
    color: var(--error);
    margin-left: 2px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--primary-light);
    background: #fff;
  }
  .form-group textarea {
    min-height: 80px;
    resize: vertical;
  }
  .form-group input.error,
  .form-group select.error {
    border-color: var(--error);
    background: #fff8f8;
  }
  .error-msg {
    font-size: 12px;
    color: var(--error);
    margin-top: 4px;
    display: none;
  }

  /* ---- Meal Period Selector ---- */
  .period-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
  }
  .period-btn {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .period-btn.active {
    border-color: var(--primary);
    background: #fdf5ee;
    color: var(--primary);
    font-weight: 600;
  }
  .time-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .time-slot {
    padding: 8px 14px;
    font-size: 13px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--input-bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .time-slot.active {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
    font-weight: 500;
  }

  /* ---- Guest Counter ---- */
  .guest-counter {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .guest-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--input-bg);
    font-size: 20px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    user-select: none;
  }
  .guest-btn:active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .guest-number {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    min-width: 50px;
    text-align: center;
  }

  /* ---- Submit Button ---- */
  .submit-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #fff;
    background: linear-gradient(135deg, #8B4513, #A0522D);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 24px;
  }
  .submit-btn:active { opacity: 0.85; transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; pointer-events: none; }

  /* ---- Result Card ---- */
  .result-card {
    display: none;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 0;
    box-shadow: var(--shadow);
    margin-top: 20px;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-card.show { display: block; }
  .result-header {
    background: linear-gradient(135deg, #5a8a4a, #6a9a5a);
    color: #fff;
    text-align: center;
    padding: 16px;
  }
  .result-header .check-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 4px;
  }
  .result-header .result-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .result-body {
    padding: 20px;
  }
  .note-text {
    background: #fdfaf6;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 2;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    user-select: all;
  }
  .copy-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--primary);
    background: #fdf5ee;
    border: 1.5px solid var(--primary);
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .copy-btn:active { background: var(--primary); color: #fff; }
  .copy-btn.copied {
    background: var(--success);
    color: #fff;
    border-color: var(--success);
  }
  .back-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    color: var(--text-secondary);
    background: transparent;
    border: none;
    cursor: pointer;
    margin-top: 6px;
    text-decoration: underline;
  }

  /* ---- Footer ---- */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #bbb;
  }

  /* ---- Hidden inputs for time ---- */
  .hidden-field { display: none; }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="restaurant-name" id="restaurantName">我的餐厅</div>
  <div class="subtitle">ONLINE RESERVATION</div>
</div>

<div class="container">

  <!-- Form -->
  <div class="form-card" id="formCard">
    <div class="section-title">
      <span class="icon">📋</span> 填写预定信息
    </div>

    <div class="form-group">
      <label>姓名 <span class="required">*</span></label>
      <input type="text" id="customerName" placeholder="请输入您的姓名" maxlength="20">
      <div class="error-msg" id="nameError">请输入姓名</div>
    </div>

    <div class="form-group">
      <label>手机号 <span class="required">*</span></label>
      <input type="tel" id="customerPhone" placeholder="请输入手机号码" maxlength="11">
      <div class="error-msg" id="phoneError">请输入正确的手机号码</div>
    </div>

    <div class="form-group">
      <label>用餐日期 <span class="required">*</span></label>
      <input type="date" id="diningDate">
      <div class="error-msg" id="dateError">请选择用餐日期</div>
    </div>

    <div class="form-group">
      <label>用餐时段 <span class="required">*</span></label>
      <div class="period-selector" id="periodSelector">
        <div class="period-btn" data-period="lunch" onclick="selectPeriod('lunch')">🥢 午餐</div>
        <div class="period-btn" data-period="dinner" onclick="selectPeriod('dinner')">🍷 晚餐</div>
      </div>
      <div class="time-slots" id="timeSlots"></div>
      <div class="error-msg" id="timeError">请选择用餐时段和时间</div>
    </div>

    <div class="form-group">
      <label>用餐人数 <span class="required">*</span></label>
      <div class="guest-counter">
        <div class="guest-btn" onclick="changeGuests(-1)">−</div>
        <div class="guest-number" id="guestNumber">2</div>
        <div class="guest-btn" onclick="changeGuests(1)">+</div>
      </div>
    </div>

    <div class="form-group">
      <label>特殊需求</label>
      <textarea id="specialRequests" placeholder="如有忌口、过敏、座位偏好等，请在此注明" maxlength="200"></textarea>
    </div>

    <button class="submit-btn" onclick="submitForm()">确认预定</button>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="check-icon">✅</span>
      <span class="result-title">预定信息已生成</span>
    </div>
    <div class="result-body">
      <div class="note-text" id="noteText"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyNote()">📋 一键复制笔记</button>
      <button class="back-btn" onclick="resetForm()">← 重新填写</button>
    </div>
  </div>

</div>

<div class="footer">到店时请出示预定信息</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ---- Config ----
  const RESTAURANT_NAME = '我的餐厅';
  document.getElementById('restaurantName').textContent = RESTAURANT_NAME;

  const timeSlotsData = {
    lunch: ['11:00', '11:30', '12:00', '12:30', '13:00', '13:30'],
    dinner: ['17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30']
  };

  let selectedPeriod = null;
  let selectedTime = null;
  let guestCount = 2;

  // ---- Init ----
  function init() {
    // Set min date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('diningDate').setAttribute('min', today);

    // Render time slots empty
    document.getElementById('timeSlots').innerHTML = '';
  }

  // ---- Period Selection ----
  function selectPeriod(period) {
    selectedPeriod = period;
    selectedTime = null;

    // Update buttons
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.period === period);
    });

    // Render time slots
    const slots = timeSlotsData[period];
    const container = document.getElementById('timeSlots');
    container.innerHTML = slots.map(t =>
      `<div class="time-slot" onclick="selectTime('${t}')">${t}</div>`
    ).join('');

    clearError('timeError');
  }

  function selectTime(time) {
    selectedTime = time;
    document.querySelectorAll('.time-slot').forEach(s => {
      s.classList.toggle('active', s.textContent === time);
    });
    clearError('timeError');
  }

  // ---- Guest Counter ----
  function changeGuests(delta) {
    guestCount = Math.max(1, Math.min(99, guestCount + delta));
    document.getElementById('guestNumber').textContent = guestCount;
  }

  // ---- Validation ----
  function showError(fieldId, msgId) {
    document.getElementById(fieldId).classList.add('error');
    document.getElementById(msgId).style.display = 'block';
  }
  function clearError(msgId) {
    const el = document.getElementById(msgId);
    if (el) el.style.display = 'none';
    // Clear related input error
    if (msgId === 'nameError') document.getElementById('customerName').classList.remove('error');
    if (msgId === 'phoneError') document.getElementById('customerPhone').classList.remove('error');
    if (msgId === 'dateError') document.getElementById('diningDate').classList.remove('error');
    if (msgId === 'timeError') {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('error'));
    }
  }

  function validate() {
    let valid = true;

    const name = document.getElementById('customerName').value.trim();
    if (!name) { showError('customerName', 'nameError'); valid = false; } else { clearError('nameError'); }

    const phone = document.getElementById('customerPhone').value.trim();
    if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showError('customerPhone', 'phoneError'); valid = false; } else { clearError('phoneError'); }

    const date = document.getElementById('diningDate').value;
    if (!date) { showError('diningDate', 'dateError'); valid = false; } else { clearError('dateError'); }

    if (!selectedPeriod || !selectedTime) {
      document.getElementById('timeError').style.display = 'block';
      valid = false;
    }

    return valid;
  }

  // ---- Submit ----
  function submitForm() {
    if (!validate()) return;

    const name = document.getElementById('customerName').value.trim();
    const phone = document.getElementById('customerPhone').value.trim();
    const date = document.getElementById('diningDate').value;
    const dateFormatted = formatDate(date);
    const periodLabel = selectedPeriod === 'lunch' ? '午餐' : '晚餐';
    const special = document.getElementById('specialRequests').value.trim() || '无';

    const note =
`══════════════════
    📋 预定信息
══════════════════

🏠 餐厅：${RESTAURANT_NAME}
👤 姓名：${name}
📱 手机：${phone}
📅 日期：${dateFormatted}
🕐 时间：${periodLabel} ${selectedTime}
👥 人数：${guestCount} 位
📝 备注：${special}

══════════════════
  到店时请出示此信息
  如有变动请联系餐厅
══════════════════`;

    document.getElementById('noteText').textContent = note;
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('resultCard').classList.add('show');

    // Reset copy button
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.textContent = '📋 一键复制笔记';
    copyBtn.classList.remove('copied');
  }

  // ---- Copy ----
  function copyNote() {
    const text = document.getElementById('noteText').textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => onCopied());
    } else {
      // Fallback for WeChat/older browsers
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        onCopied();
      } catch (e) {
        showToast('复制失败，请长按手动复制');
      }
      document.body.removeChild(ta);
    }
  }

  function onCopied() {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    showToast('已复制到剪贴板');
  }

  // ---- Reset ----
  function resetForm() {
    document.getElementById('customerName').value = '';
    document.getElementById('customerPhone').value = '';
    document.getElementById('diningDate').value = '';
    document.getElementById('specialRequests').value = '';
    selectedPeriod = null;
    selectedTime = null;
    guestCount = 2;
    document.getElementById('guestNumber').textContent = '2';
    document.getElementById('timeSlots').innerHTML = '';
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.error-msg').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));

    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('formCard').style.display = 'block';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ---- Helpers ----
  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = weekDays[d.getDay()];
    return `${y}年${m}月${day}日 ${w}`;
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  // ---- Init on load ----
  init();
</script>

</body>
</html>
